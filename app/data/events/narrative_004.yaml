prompt_template: "你回到了多年前修行过的地方。曾经熟悉的山门已经斑驳，当年种下的小树已经参天。旧地重游，物是人非——那些与你一同入门的师兄弟有的早已陨落，有的远走他乡。你站在曾经修炼的石台上，感受着岁月在景物上留下的痕迹，心中涌起无限感慨。"
fallback_narrative: "你回到了多年前修行过的地方。熟悉的石门已经斑驳，当年种下的小树已长成参天大树。旧地重游，物是人非——那些曾与你一同入门的师兄弟有的早已陨落，有的远走他乡。你站在曾经修炼的石台上，心中涌起无限感慨。"
