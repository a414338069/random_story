prompt_template: "你在一处灵气充沛的古地静坐悟道。天地灵气的流动、草木生长的脉动、星辰运行的轨迹——这一切在你的神识中变得前所未有的清晰。你开始领悟到一些超越法术层面的东西：天道运转的根本法则。虽然只是管中窥豹，但这一丝感悟足以让你的道行精进一大步。"
fallback_narrative: "你在一处古地静坐悟道。天地灵气的流动、草木生长的脉动、星辰运行的轨迹在你的神识中变得前所未有的清晰。你开始领悟到一些超越法术层面的东西——天道运转的根本法则。虽然只是管中窥豹，但这一丝感悟足以让你的道行精进。"
