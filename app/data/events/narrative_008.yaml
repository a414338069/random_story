prompt_template: "飞升在即，你感受到天地间的法则在你周围凝聚。回首这一生的修仙之路——从凡人到如今的半步飞升，多少生离死别，多少艰难险阻。你最后看了一眼这片养育你的天地，心中既有对故土的眷恋，也有对仙界的向往。飞升之前，你需要了却最后的尘缘。"
