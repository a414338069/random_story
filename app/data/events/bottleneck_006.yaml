prompt_template: "元婴已经凝练到极致，你隐约感到一道通往更高境界的门扉就在前方——但那扇门紧闭着，门后是化神境界特有的元神蜕变。你的元婴日渐壮大，但瓶颈也随之而来：化神需要的不再是灵力积累，而是对天地法则的根本性领悟。你感到自己卡在了这最后一关。"
fallback_narrative: "元婴凝练到了极致，但化神的瓶颈横亘在前。你的元婴日渐壮大，要在最后关头完成元神蜕变，需要的不是更多灵力，而是对天地法则的根本领悟。你感到自己正卡在通往化神的最后一关。"
