id: "adventure_017"
type: "adventure"
title: "上古战场"
trigger_conditions:
  min_realm: "合体"
  max_realm: "大乘"
  min_age: 1000
  max_age: 20000
  required_faction: null
weight: 0.2
scenarios:
  - generic_daily
trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L3"
prompt_template: "你的神识探测到了一处被封印的上古战场。据古籍记载，这里曾是数千年前仙魔大战的主战场，无数大乘乃至飞升境界的强者在此陨落。战场中残留的仙器碎片、陨落大能的道果残片，以及未散的杀阵和怨魂，构成了极致的危险与机遇。"
fallback_narrative: "你发现了一处被封印的上古战场——数千年前仙魔大战的主战场，无数大乘乃至飞升境界的强者在此陨落。战场中残留的仙器碎片与道果残片是至宝，但未散的杀阵与怨魂也构成了极致的危险。"
default_options:
  - id: "opt1"
    text: "在外围搜罗仙器碎片"
    consequences:
      cultivation_gain: 120
      spirit_stones_gain: 300
      age_advance: true
  - id: "opt2"
    text: "深入核心，寻找陨落大能的道果残片"
    consequences:
      cultivation_gain: 200
      age_advance: true
      health_change: -50
  - id: "opt3"
    text: "破解战场中的古代杀阵，以战悟道"
    consequences:
      cultivation_gain: 160
      age_advance: true
      health_change: -25
