prompt_template: "你在深山修行时不慎跌落一处隐秘山谷，谷中别有洞天——这竟是一处从未有人涉足的上古秘境。灵气浓郁得几乎凝成水雾，奇花异草遍布其间..."
fallback_narrative: "脚下一滑，你顺着陡坡滚落了下去。等回过神来，发现自己身处一个被群山环抱的隐秘山谷。这里的灵气浓郁得令人窒息，空气中飘浮着点点荧光，地上铺满了不知名的灵草。你意识到自己撞上了一处未经开发的秘境。"
