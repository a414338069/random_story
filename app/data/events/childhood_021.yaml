trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L1"
prompt_template: "你{age}岁了。今年瘟疫席卷了村子，许多乡亲病倒了，空气中弥漫着草药和恐惧的味道。描述你在这场灾难中的所见所感——谁病倒了？你经历了怎样的恐惧和无助？又是什么让你在这段黑暗的日子里坚持了下来？200字以内，第二人称。"
fallback_narrative: "瘟疫是从村东头的老王家开始的。先是发烧说胡话，然后是浑身出红疹。不到半个月，半个村子的人都躺下了。空气中飘着浓重的药味，家家户户门口都点着艾草，但好像什么都挡不住那股阴沉沉的气氛。你爹也病倒了，躺在里屋的草席上，脸烧得通红，嘴唇干裂出一道道口子。娘日夜守在床边，眼睛熬得通红。你端着药碗给爹送药时，看见他原本粗壮的手臂瘦得只剩一层皮，眼泪就不争气地掉了下来。爹费力地睁开眼，哑着嗓子说了一句'娃别怕，爹还要看你娶媳妇呢'，然后又沉沉睡去。你在那个瞬间忽然明白——活着本身就是一场战斗，有时候比什么都艰难。幸运的是，邻村来了个游方郎中，用几副苦得钻心的草药救回来大半的人，你爹也在其中。可村里还是走了三个老人，他们的坟就立在后山坡上，你每次路过都会停下来站一会儿。"
default_options:
  - id: "opt1"
    text: "帮着照顾病人——你在苦难中迅速长大"
    consequences:
      cultivation_gain: 2
      age_advance: true
  - id: "opt2"
    text: "陪在父亲身边默默祈祷——你学会了珍惜身边人"
    consequences:
      cultivation_gain: 1
      age_advance: true
