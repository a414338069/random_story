id: "sect_003"
type: "adventure"
title: "晋升考核"
trigger_conditions:
  min_realm: "筑基"
  max_realm: "金丹"
  min_age: 50
  max_age: 500
  required_faction: null
  requires_any_faction: true
weight: 0.3
prompt_template: "你获得了参加内门弟子晋升考核的资格。考核分为：生死擂台赛、丹道炼器二选一、以及长老面试。你需要选择主攻方向。"
fallback_narrative: "内门晋升考核在即，三大试炼：生死擂台、丹道炼器、长老面试。你必须选择主攻方向。"
default_options:
  - id: "opt1"
    text: "主攻擂台赛 — 以武证道，胜者为尊"
    consequences:
      cultivation_gain: 35
      spirit_stones_gain: 15
      age_advance: true
  - id: "opt2"
    text: "主攻丹道炼器 — 以技服人"
    consequences:
      cultivation_gain: 20
      spirit_stones_gain: 30
      age_advance: true
  - id: "opt3"
    text: "游走三关 — 不求第一，只求全面通过"
    consequences:
      cultivation_gain: 25
      spirit_stones_gain: 20
      age_advance: true
