options:
  - id: "seek_guidance"
    text: "请教修炼之法"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      attribute_changes:
        root_bone: 0.5
      tag_add:
        - "bond:childhood_memory=请教游方道人"
    aftermath_template: "你鼓起勇气挤到老道人面前，结结巴巴地问他怎样才能像传说中的仙人一样飞天遁地。老道人闻言哈哈大笑，伸出粗糙的手掌在你头顶轻轻一拍，说了一句你似懂非懂的话：'根骨尚可，心性未定。若有机缘，自会相见。'你只觉得一股暖流从头窜到脚底，浑身说不出的舒坦。"
  - id: "listen_story"
    text: "听他讲述故事"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      attribute_changes:
        comprehension: 0.5
      tag_add:
        - "bond:childhood_memory=聆听游方道人故事"
    aftermath_template: "你找了个树墩坐下，托着腮听老道人讲那些山外的事。他说南方有座剑山，山上修士御剑飞行，剑气纵横百里；他说东海有蛟龙，翻江倒海之时可令天地变色；他说九天之上有仙宫，仙人俯瞰众生，超脱轮回。你听得入了迷，直到月上枝头才依依不舍地回家。那些光怪陆离的故事像种子一样埋在了你心里。"
  - id: "help_out"
    text: "帮忙搭把手"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      tag_add:
        - "state:diligent_child"
    aftermath_template: "你见老道人的葫芦滚落在地，赶紧跑过去捡起来双手递还。他愣了一下，笑着接过葫芦，从怀里摸出一颗黑乎乎的药丸塞到你手里：'这是辟谷丹，三天不吃东西也不饿。拿着吧，算是还你的人情。'你如获至宝地攥着那颗药丸跑回家，心里美滋滋的。"
