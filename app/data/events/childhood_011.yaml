prompt_template: |
  你{age}岁那年，村里来了一个云游四方的老道人。他衣衫简朴，腰间挂着一个葫芦，一双眼睛却亮得惊人。他在村口的大槐树下歇脚，村民们围了过去，有的求药，有的问卦，有的只是看热闹。你站在人群外围，好奇地打量着他。描述这个场景——老道人是否注意到了你？他看向你时是什么神情？200字以内，第二人称。
fallback_narrative: |
  老道人在村口歇脚的消息很快传遍了整个村子。你跟着大人们围了过去，挤在人群缝隙里偷偷打量他。他看上去六十来岁，鬓发花白，但腰杆挺得笔直，一双眼睛不像村里老人那般浑浊，反而清澈通透。村民们七嘴八舌地问东问西，他只是笑呵呵地一一应付。你正准备转身回家，他却忽然朝你这边看了一眼，目光在你身上停顿了片刻，微微点了点头。你心里莫名一动，脚步也不自觉地停了下来。
default_options:
  - id: "seek_guidance"
    text: "请教修炼之法"
