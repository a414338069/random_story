fallback_narrative: "原本晴朗的天空忽然暗了下来，阴风阵阵，连空气都变得黏稠压抑。三道漆黑的遁光如陨星般坠落在你前方百丈处，三个黑袍人缓缓站直了身。为首那人摘下兜帽，一双猩红的眸子死死盯着你，周身散发的血煞之气让方圆十里的草木迅速枯萎。这是货真价实的魔修，绝非善类。"
