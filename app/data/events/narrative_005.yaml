prompt_template: "你御剑而行，云游四方。脚下是万里山河，头顶是无尽苍穹。你路过凡人的城池，也拜访修仙的宗门；你在雪山之巅打坐，也在沙漠深处悟道。每一次云游都是一次对天地大道的叩问，每一次驻足都是一次心境的升华。"
