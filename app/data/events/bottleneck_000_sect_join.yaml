id: "bottleneck_000_sect_join"
type: "bottleneck"
title: "门派选择"
trigger_conditions:
  min_realm: "凡人"
  max_realm: "凡人"
  min_age: 10
  max_age: 30
  required_faction: null
weight: 50.0
scenarios:
  - generic_daily
  - has_technique
trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L3"
prompt_template: "你已年满{age}岁，有修仙门派前来招收弟子..."
fallback_narrative: "三大修仙门派前来收徒，你需要在万剑山庄、逍遥派、金刚寺中做出选择，也可以选择自由修炼不加入任何门派。"
default_options:
  - id: "sect_sword"
    text: "加入万剑山庄"
    consequences:
      faction_assign: "万剑山庄"
      cultivation_gain: 20
      age_advance: true
  - id: "sect_xiaoyao"
    text: "加入逍遥派"
    consequences:
      faction_assign: "逍遥派"
      cultivation_gain: 20
      age_advance: true
  - id: "sect_jingang"
    text: "加入金刚寺"
    consequences:
      faction_assign: "金刚寺"
      cultivation_gain: 20
      age_advance: true
  - id: "sect_rogue"
    text: "暂不加入，独自修行"
    consequences:
      cultivation_gain: 5
      age_advance: true
      tag_add: ["identity:decided_rogue"]
