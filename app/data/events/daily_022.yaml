prompt_template: "你{age}岁这年，大乘圆满已臻至境。某一日，你静坐山巅，忽然通体金光大作，九天之上有仙乐隐隐传来。天地间灵气疯狂朝你汇聚，肉身开始变得通明如玉——白日飞升的时刻，终于到了。请描绘飞升前最后一刻的心境与天象异变。"
fallback_narrative: "你盘膝坐在万丈高峰之巅，周身金光如潮水般涌动。苍穹裂开一道金色的缝隙，仙乐缥缈自九天之上传来，那是仙界对你的召唤。你感到肉身正在一点一点地转化为纯阳仙体，凡尘的一切束缚在这一刻彻底消散。这一生修行的终点，便是此刻的通天之门。"
