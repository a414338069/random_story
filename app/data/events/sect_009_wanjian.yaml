      cultivation_gain: 40
      spirit_stones_gain: 0
      age_advance: true
  - id: "opt2"
    text: "参悟飘逸剑意 — 身剑合一，无迹可寻"
    consequences:
      cultivation_gain: 30
      spirit_stones_gain: 15
      age_advance: true
  - id: "opt3"
    text: "参悟厚重剑意 — 以拙胜巧，大巧不工"
