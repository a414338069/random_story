prompt_template: "万剑山庄后山的剑崖上，刻满了历代剑仙留下的剑痕。每一道剑痕都蕴含着一式绝世剑法。你站在崖前，感应到三道剑意与你产生共鸣——一道霸道凌厉，一道飘逸出尘，一道厚重如山。"
fallback_narrative: "剑崖之上，三道剑意与你共鸣：霸道剑意欲摧山断岳，飘逸剑意如云卷云舒，厚重剑意似大地沉凝。你需要选择一道剑意参悟。"
default_options:
