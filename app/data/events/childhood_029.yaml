id: "childhood_029"
type: "childhood"
narrative_only: false
title: "救下幼狐"
trigger_conditions:
  min_realm: "凡人"
  max_realm: "凡人"
  min_age: 4
  max_age: 8
  required_faction: null
weight: 5.0
scenarios:
  - childhood
trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L1"
prompt_template: "你{age}岁了。你在山间小路边发现了一只受伤的小狐狸——前腿被捕兽夹夹住了，正在微弱地哀鸣。描述你发现它、接近它、救下它的过程。小狐狸对你是什么反应？你是否在它的眼睛里看到了某种不属于'野兽'的光芒？200字以内，第二人称。"
fallback_narrative: "你是在采蘑菇的路上发现它的。那声音不大——细细的、断断续续的呜咽，像是风穿过破竹管。你拨开荆棘丛，看见一只火红色的小狐狸蜷缩在烂叶堆里，左前腿被一只锈迹斑斑的小夹子牢牢咬住，毛上沾着干涸的血迹，瘦得肋骨一根根凸出来。你蹲下时它瑟缩了一下，睁大了湿漉漉的眼睛看着你，目光里没有野兽的凶光，反倒像是……像是在求你。你把手伸过去，它没有咬，只是浑身发抖。你用树枝小心撬开夹子，把衣襟撕下一块给它简单裹了裹伤口。小狐狸舔了舔你的手指，抬头看了你好一会儿，然后转身一瘸一拐钻进了灌木丛。那年冬天，你家的门槛上隔三差五就会出现一只死兔子或一串野果——谁也不知道是谁送的，但你心里隐约有了答案。"
default_options:
  - id: "opt1"
    text: "把小狐狸带回家细心照料——你天生对生灵怀有怜悯之心"
    consequences:
      cultivation_gain: 2
      age_advance: true
  - id: "opt2"
    text: "放它归山悄悄跟随——你想知道它住在哪里"
    consequences:
      cultivation_gain: 3
      age_advance: true
