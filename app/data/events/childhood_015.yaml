id: "childhood_015"
type: "childhood"
narrative_only: false
title: "一起冒险"
trigger_conditions:
  min_realm: "凡人"
  max_realm: "凡人"
  min_age: 5
  max_age: 9
  required_faction: null
weight: 5.0
scenarios:
  - childhood
trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L1"
prompt_template: "你{age}岁了。你和村中几个要好的伙伴决定去村外的那条大家一直不敢去的老河道探险。描述你们的冒险——你们带上了什么？在路上遇到了什么稀奇古怪的事？谁最先打退堂鼓，又是谁一路坚持到了最后？200字以内，第二人称。"
fallback_narrative: "那天一早，你和铁蛋、小翠偷偷带着干粮和竹竿溜出了村。你们要去的地方是村东那条干涸了不知多少年的老河道，大人们总说那里有蛇有鬼，可你们六个孩子凑在一起，觉得天底下没什么好怕的。沿着河床走了大半个时辰，你们在淤泥里捡到了一枚锈迹斑斑的铜钱，上面刻着看不懂的花纹。铁蛋大惊小怪地喊着'宝藏宝藏'，小翠却指着一块河床上露出来的石头说上面有个奇怪的图案。你蹲下来仔细看，那图案像是一个盘坐的人形。大家七嘴八舌地争论了半天，最后谁也没能说清那到底是什么，但每个人都记得那天夕阳下回家时心里那种又害怕又兴奋的感觉。"
default_options:
  - id: "opt1"
    text: "把铜钱藏起来当作护身符——这份神秘的发现让你兴奋不已"
    consequences:
      cultivation_gain: 2
      age_advance: true
  - id: "opt2"
    text: "回去把石头上的图案描下来——你隐隐觉得那图案不简单"
    consequences:
      cultivation_gain: 3
      age_advance: true
