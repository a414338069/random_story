prompt_template: "你赶路时路过一处险要的山隘，突然从石壁后跳出十来个手持刀棍的山贼。为首的光头大汉将刀横在路中间，恶狠狠地道：「此路是我开！」"
fallback_narrative: "山路越走越窄，两侧的山壁陡峭得像刀削的一样。你正暗自警惕，忽听一声唿哨，十几条人影从乱石堆后蹿了出来，转眼就将前后道路封堵得严严实实。为首的山贼满脸横肉，手中的钢刀在阳光下闪着寒光。"
