fallback_narrative: "你拨开齐腰的杂草，发现前方石壁上密密麻麻全是蛇洞。还没来得及后退，嘶嘶声从四面八方传来。一条条碗口粗的妖蟒从洞中探出头来，蛇信吞吐间，空气中弥漫着腥甜的气息。这分明是一个精心布置的陷阱。"
