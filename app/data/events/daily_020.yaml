fallback_narrative: "你背着矿篓沿着坑道深入山腹，矿壁上偶尔闪烁出星星点点的灵光。你寻到一处灵气汇聚之处，挥舞矿锄小心翼翼地开采。碎石落下，几块拳头大小的下品灵石显露出来，散发着蒙蒙的乳白色光芒。"
