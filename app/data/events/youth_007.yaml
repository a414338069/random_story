prompt_template: "你{age}岁了。一个雷雨交加的夜晚，你做了一个奇怪的梦——梦中你站在九天之上，周围是无尽的星河与仙宫。醒来后你发现自己的手掌竟然微微发光，能感受到空气中流动着的某种温暖的气息。村里的老人说这是「开天眼」的征兆，说明你有修仙的天赋。"
fallback_narrative: "你{age}岁了。雷雨之夜做了一个奇怪的梦——梦中你站在九天之上，周围是无尽的星河与仙宫。醒来后你的手掌微微发光，竟能感受到空气中流动的温暖气息。村里的老人说这是「开天眼」的征兆，你有修仙的天赋。"
