prompt_template: "天地变色，万籁俱寂。你站在九天之上，体内大乘圆满的灵力与天道产生了最后的共鸣。飞升劫——这是修仙之路的终极考验，九重天雷将依次降临。每渡过一重，肉身与元神便升华一分；若失败，则万劫不复。整个修真界的目光都汇聚于此。"
fallback_narrative: "天地变色，万籁俱寂。你体内大乘圆满的灵力与天道产生了最后的共鸣。飞升劫降临——九重天雷依次轰下，每一重都携带着毁天灭地之威。整个修真界的目光都汇聚于此，成败在此一举。"
