options:
  - id: "pick_fruit"
    text: "摘取野果"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      attribute_changes:
        mindset: 0.5
      tag_add:
        - "bond:childhood_memory=山间采果"
    aftermath_template: "你爬上古樟树，摘下了一串紫红色的野果。果实饱满多汁，咬一口满嘴都是甜丝丝的味道。你坐在树干上晃着腿，一边吃一边看远山近树，心里说不出的惬意。山风吹过，树叶沙沙作响，你忽然觉得天地间的一切都是那么美好有趣。这份宁静愉悦的心情，在之后的日子里偶尔还会浮上心头。"
  - id: "explore_cave"
    text: "探索山洞"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      attribute_changes:
        luck: 0.5
      tag_add:
        - "bond:childhood_memory=山间探洞"
    aftermath_template: "你壮着胆子钻进树洞，里面比想象中宽敞许多。洞壁上长着一些发光的苔藓，幽幽的蓝光照亮了这个小天地。你注意到洞壁一角刻着一个奇怪的符号——看起来像是一个古老的文字，但你完全不认识。你伸手摸了摸那个符号，指尖传来一丝微弱的温热。你决定把这个秘密藏在心底，当作自己的小小宝藏。"
  - id: "observe_silently"
    text: "静静观察"
    consequences:
      cultivation_gain: 0
      spirit_stones_gain: 0
      tag_add:
        - "state:nature_child"
    aftermath_template: "你没有急着做什么，只是靠在大樟树下静静地待着。你注意到树上有两只小松鼠在追逐打闹，一只蚂蚁正艰难地拖着一片树叶翻越树根，远处有一只老鹰在天空画着圆圈。你发现当你安静下来的时候，周围的世界变得格外清晰——你能听到溪水叮咚的声音，能分辨出七八种不同的鸟叫，甚至能感觉到山风穿过树叶时那种细腻的触感。"
