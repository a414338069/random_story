prompt_template: |
  你{age}岁那年夏天，独自跑到村后的山坡上玩耍。山间野果累累，鸟鸣啾啾，溪水潺潺。你在追逐一只蝴蝶时，发现了一处平时从没注意过的隐秘角落。描述这个场景——你看到了什么？那里有什么特别之处？你当时的心情如何？200字以内，第二人称。
fallback_narrative: |
  夏日的午后，你趁大人午睡偷偷溜出家门，光着脚丫沿着山间小路一路向上。路边的野花开得正好，紫的黄的白的，星星点点铺了半面山坡。你追着一只蓝色翅膀的蝴蝶跑进一片灌木丛，拨开密密的枝条后，眼前豁然开朗——一棵巨大的老樟树矗立在那里，树干粗得要三四个你才能合抱。树根下有一个不大不小的树洞，洞口爬满了青苔蔓藤，像是一间天然的小屋子。阳光透过树叶的缝隙洒下来，在地上印出斑驳的光影，空气中弥漫着草木和泥土的气息。
