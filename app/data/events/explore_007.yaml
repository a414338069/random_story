prompt_template: "你循着古地图的指引，在海天相接之处找到了一座被天然禁制隐藏的洞天福地入口。穿越迷雾之后，眼前的景象令人震撼——这里竟是上古大能开辟的一方小世界，自成天地法则..."
fallback_narrative: "踏过那道如水幕般的禁制之后，眼前的景象豁然开朗。这里天穹湛蓝，山川灵秀，空气中弥漫着比外界浓郁十倍的灵气。溪水中流淌的竟是液化的灵泉，两岸遍布外界早已绝迹的灵草。你甚至能感受到这个小世界的天地法则与你修炼的功法隐隐共鸣——这是一片真正的洞天福地。"
default_options:
  - id: "opt1"
    text: "在福地核心闭关修炼"
