id: "childhood_022"
type: "childhood"
narrative_only: false
title: "父亲教打猎"
trigger_conditions:
  min_realm: "凡人"
  max_realm: "凡人"
  min_age: 6
  max_age: 10
  required_faction: null
weight: 5.0
scenarios:
  - childhood
trigger_tags:
  require_all: []
  require_any: []
  block: []
event_tier: "L1"
prompt_template: "你{age}岁了。父亲觉得你长大了，第一次带你进山学打猎。描述这次父与子的山林之行——父亲教了你什么？你学到了哪些远远超越打猎本身的道理？你第一次亲手命中猎物时是什么感受？200字以内，第二人称。"
fallback_narrative: "天还没亮，爹就掀了你的被子。饼子和竹筒水已经备好了，爹扛着弓，你拎着箭袋，一前一后踩着露水上了山。走了大半个时辰爹一句话没说，只是时不时回头看看你有没有跟上来。突然他停在一棵松树前，指着树干上一道旧刮痕——'看，这是野猪蹭树留下的，新鲜的，两日内走过。'你学着他的样子蹲下来看地上的脚印，分辨枯叶被什么动物踩过。正午时一只灰兔从灌木丛里窜出来，爹递给你弓。你拉满，瞄准，手指发抖，箭射偏了——斜斜地钉进土里。爹没有骂你，只是蹲下来拍拍你的肩膀：'打猎不是为了杀生，是为了吃饭。手要稳，心要静。不管打不打得到，太阳照常升。'回去的路上你一直在琢磨爹的话。手要稳，心要静——这句话你记了很多很多年。"
default_options:
  - id: "opt1"
    text: "静下心再试一次——在失败中学会了专注"
    consequences:
      cultivation_gain: 3
      age_advance: true
  - id: "opt2"
    text: "跟父亲学辨识山路——你记住了山林的每一条脉络"
    consequences:
      cultivation_gain: 2
      age_advance: true
