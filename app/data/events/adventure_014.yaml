prompt_template: "你在野外误入了一处天然形成的迷阵，四周雾气弥漫，方向感彻底混乱。更糟糕的是，迷阵深处隐隐传来不知名生物的嘶吼声..."
fallback_narrative: "一阵突如其来的浓雾将你吞没，四周的山林景色瞬间消失不见。你试图原路返回，却发现走了一个时辰依然在原地打转。雾气深处传来的低沉咆哮声让空气都在微微震颤——这迷阵里绝非只有你一个活物。"
