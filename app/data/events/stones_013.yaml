prompt_template: "你得到了一份古阵图，上面记载了一种名为「聚灵阵」的阵法。据图中所载，此阵可将方圆百里的灵气汇聚于一处，使修炼速度倍增。但布置聚灵阵需要消耗大量灵石作为阵基，而且阵法运转时产生的灵气波动可能会引来不速之客。"
fallback_narrative: "你得到了一份记载「聚灵阵」的古阵图，此阵可将方圆百里的灵气汇聚于一处，让修炼速度倍增。但布置它需要消耗大量灵石，而且阵法运转时的灵气波动可能会引来不速之客。"
default_options:
  - id: "opt1"
    text: "立刻布置聚灵阵，全力修炼"
    consequences:
      cultivation_gain: 60
      spirit_stones_gain: -80
      age_advance: true
  - id: "opt2"
    text: "先做好隐蔽措施再布阵"
